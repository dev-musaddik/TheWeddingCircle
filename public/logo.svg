<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <!-- Outer Circle -->
  <circle cx="250" cy="250" r="240" stroke="#D4AF37" stroke-width="4" fill="none"/>
  <circle cx="250" cy="250" r="230" stroke="#D4AF37" stroke-width="2" fill="none"/>
  
  <!-- Text Path for "THE WEDDING CIRCLE" -->
  <defs>
    <path id="circlePath" d="M 250,250 m -200,0 a 200,200 0 1,1 400,0 a 200,200 0 1,1 -400,0"/>
  </defs>
  
  <text fill="#D4AF37" font-family="serif" font-size="32" font-weight="400" letter-spacing="8">
    <textPath href="#circlePath" startOffset="50%" text-anchor="middle">
      THE WEDDING CIRCLE
    </textPath>
  </text>
  
  <!-- Ornate Door Design -->
  <g transform="translate(250, 250)">
    <!-- Fan Window -->
    <g transform="translate(0, -80)">
      <path d="M -50,-30 L -50,0 L 50,0 L 50,-30 A 50,30 0 0,0 -50,-30 Z" stroke="#D4AF37" stroke-width="2" fill="none"/>
      <!-- Fan segments -->
      <line x1="0" y1="-30" x2="0" y2="0" stroke="#D4AF37" stroke-width="1.5"/>
      <line x1="-25" y1="-20" x2="-25" y2="0" stroke="#D4AF37" stroke-width="1.5"/>
      <line x1="25" y1="-20" x2="25" y2="0" stroke="#D4AF37" stroke-width="1.5"/>
      <line x1="-40" y1="-10" x2="-40" y2="0" stroke="#D4AF37" stroke-width="1.5"/>
      <line x1="40" y1="-10" x2="40" y2="0" stroke="#D4AF37" stroke-width="1.5"/>
      <!-- Radial lines -->
      <path d="M -50,0 Q -25,-15 0,-30" stroke="#D4AF37" stroke-width="1" fill="none"/>
      <path d="M 50,0 Q 25,-15 0,-30" stroke="#D4AF37" stroke-width="1" fill="none"/>
    </g>
    
    <!-- Door Frame -->
    <rect x="-60" y="-50" width="120" height="140" stroke="#D4AF37" stroke-width="3" fill="none"/>
    
    <!-- Left Door Panel -->
    <g transform="translate(-30, 15)">
      <rect x="-22" y="-60" width="44" height="130" stroke="#D4AF37" stroke-width="2" fill="none"/>
      <rect x="-18" y="-55" width="36" height="50" stroke="#D4AF37" stroke-width="1.5" fill="none"/>
      <rect x="-18" y="0" width="36" height="50" stroke="#D4AF37" stroke-width="1.5" fill="none"/>
      <!-- Ornate details -->
      <path d="M -10,-25 Q 0,-20 10,-25" stroke="#D4AF37" stroke-width="1" fill="none"/>
      <path d="M -10,25 Q 0,30 10,25" stroke="#D4AF37" stroke-width="1" fill="none"/>
      <circle cx="0" cy="-25" r="3" fill="#D4AF37"/>
      <circle cx="0" cy="25" r="3" fill="#D4AF37"/>
    </g>
    
    <!-- Right Door Panel -->
    <g transform="translate(30, 15)">
      <rect x="-22" y="-60" width="44" height="130" stroke="#D4AF37" stroke-width="2" fill="none"/>
      <rect x="-18" y="-55" width="36" height="50" stroke="#D4AF37" stroke-width="1.5" fill="none"/>
      <rect x="-18" y="0" width="36" height="50" stroke="#D4AF37" stroke-width="1.5" fill="none"/>
      <!-- Ornate details -->
      <path d="M -10,-25 Q 0,-20 10,-25" stroke="#D4AF37" stroke-width="1" fill="none"/>
      <path d="M -10,25 Q 0,30 10,25" stroke="#D4AF37" stroke-width="1" fill="none"/>
      <circle cx="0" cy="-25" r="3" fill="#D4AF37"/>
      <circle cx="0" cy="25" r="3" fill="#D4AF37"/>
    </g>
    
    <!-- Door handles -->
    <circle cx="-15" cy="15" r="4" fill="#D4AF37"/>
    <circle cx="15" cy="15" r="4" fill="#D4AF37"/>
  </g>
  
  <!-- Bottom Decorative Flourish -->
  <g transform="translate(250, 420)">
    <path d="M -60,0 Q -40,10 -20,5 Q -10,3 0,0 Q 10,3 20,5 Q 40,10 60,0" stroke="#D4AF37" stroke-width="2" fill="none"/>
    <circle cx="0" cy="10" r="4" fill="#D4AF37" transform="rotate(45 0 10)">
      <animate attributeName="r" values="4;5;4" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
